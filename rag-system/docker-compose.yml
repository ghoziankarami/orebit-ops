services:
  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - ./chroma:/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'chroma --help >/dev/null'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  rag-api:
    build:
      context: .
      target: api-wrapper
    restart: unless-stopped
    network_mode: host
    command: >-
      sh -lc 'if ! command -v python3 >/dev/null 2>&1; then
      apt-get update && apt-get install -y --no-install-recommends python3 &&
      rm -rf /var/lib/apt/lists/*;
      fi; exec node index.js'
    environment:
      PORT: ${RAG_API_PORT:-3004}
      RAG_API_KEY: ${RAG_API_KEY:-}
      RAG_STATS_TTL_MS: ${RAG_STATS_TTL_MS:-60000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
      OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      OPENCLAW_WORKSPACE_ROOT: /workspace/rag-system
    volumes:
      - ./:/workspace/rag-system
      - ./chroma:/workspace/rag-system/.vector_db/workspace
      - ./chroma:/workspace/rag-system/.vector_db/papers
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "require(''http'').get(''http://127.0.0.1:3004/api/rag/health'', res => { process.exit(res.statusCode === 200 ? 0 : 1) }).on(''error'', () => process.exit(1))"'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  rag-dashboard:
    build:
      context: .
      target: dashboard
    restart: unless-stopped
    ports:
      - "8503:8503"
    environment:
      OPENCLAW_WORKSPACE_ROOT: /workspace/rag-system
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
    volumes:
      - ./:/workspace/rag-system
      - ./chroma:/workspace/rag-system/.vector_db/workspace
      - ./chroma:/workspace/rag-system/.vector_db/papers
    depends_on:
      chroma:
        condition: service_healthy
      rag-api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8503/_stcore/health'', timeout=5).read()"'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
