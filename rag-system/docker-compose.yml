version: '3.8'

services:
  # Embedding Server (all-MiniLM-L6-v2)
  embedding-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./file_store/embeddings:/data/embeddings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ChromaDB
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - ./file_store/chroma:/chroma/chroma.db
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # RAG API Wrapper (Node.js)
  api-wrapper:
    build:
      context: ../..
      dockerfile: api-wrapper/Dockerfile
    ports:
      - "3004:3004"
    environment:
      - OREBIT_EMBEDDING_API_URL=http://embedding-server:8000/v1/embeddings
      - RAG_CHROMA_URL=http://chromadb:8000
      - RAG_API_HOST=0.0.0.0
      - PORT=3004
      - RAG_STATS_TTL_MS=60000
    depends_on:
      - embedding-server
      - chromadb
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/api/rag/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  default:
    name: rag-network
